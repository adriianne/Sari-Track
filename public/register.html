<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SARI-TRACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-container">
        <!-- Back Button -->
        <a href="landingpage.html" class="back-btn">
            <span class="material-symbols-outlined">arrow_back</span>
            Back
        </a>

        <!-- Brand Title -->
        <div class="brand-title">
            <span class="highlight">Sari-Track</span>: Convenient Smart Retail Tracker
        </div>

        <!-- Register Form -->
        <div class="register-form">
            <h3>Create your Account</h3>
            
            <div id="errorMessage" class="alert alert-danger" style="display:none"></div>
            <div id="successMessage" class="alert alert-success" style="display:none"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" class="input-field" placeholder="Enter your first name" required>
                </div>
                
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" class="input-field" placeholder="Enter your last name" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="input-field" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm password</label>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm password" required>
                </div>
                
                <button type="submit" class="signup-btn">Sign Up</button>
                <button type="button" class="back-login-btn" onclick="window.location.href='login.html'">Back to Login</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5UfPcgv8x8F_AnFNPOeOnCwqplJ1n8zg",
            authDomain: "sari-track-e8efe.firebaseapp.com",
            databaseURL: "https://sari-track-e8efe-default-rtdb.firebaseio.com/",
            projectId: "sari-track-e8efe",
            storageBucket: "sari-track-e8efe.firebasestorage.app",
            messagingSenderId: "554784936185",
            appId: "1:554784936185:web:2dec2a0e1eb78ab8f05228"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Passwords do not match';
                return;
            }
            
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    return database.ref('users/' + user.uid).set({
                        firstName: firstName,
                        lastName: lastName,
                        email: email,
                        createdAt: new Date().toISOString()
                    });
                })
                .then(() => {
                    successDiv.style.display = 'block';
                    successDiv.textContent = 'Registration successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                })
                .catch((error) => {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = error.message;
                });
        });
    </script>
</body>
</html>
